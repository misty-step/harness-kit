version: 1
path: .harness-kit/agent-readiness.yaml
required_fields:
  - version
  - generated_at
  - profile
  - gates
  - adr_policy
  - infrastructure
  - module_boundaries
  - mock_policy
  - observability
  - state_surfaces
  - readiness_state
  - waivers
profile:
  repo_root: string
  detected_stack: list[string]
  stack_feedback_strength: unknown | weak | moderate | strong | strict
gates:
  local: list[string]
  ci: list[string]
  coverage:
    command: string
    threshold: string
adr_policy:
  required_when: string
  paths: list[string]
infrastructure:
  manageability: unknown | human_only | cli_api_sdk | mixed
  surfaces: list[string]
module_boundaries: list[string]
mock_policy: string
observability:
  access: unknown | none | logs | metrics | traces | full
  signals: list[string]
state_surfaces:
  - name: string
    system_of_record: string
    agent_access: code | local-file | mcp | cli | api | skill | admin-ui-only | cms-only | unknown
    source_path: string
    verification_command: string
    waiver: string
    waiver_expires: YYYY-MM-DD
readiness_state: unknown | improved | preserved | regressed
waivers:
  - id: string
    scope: string
    reason: string
    expires_on: YYYY-MM-DD
    adr: string

validation:
  waivers:
    id: required non-placeholder string
    scope: required non-placeholder string
    reason: required non-placeholder string
    expires_on: required ISO date strictly after validation date
    adr: required non-placeholder string or explicit "not-required:<reason>"
  placeholders_rejected:
    - ""
    - tbd
    - todo
    - n/a
    - none
    - placeholder
  state_surfaces:
    name: required non-placeholder string
    system_of_record: required non-placeholder string
    agent_access: required enum
    source_path: required for code/local-file/mcp/cli/api/skill access
    verification_command: required for code/local-file/mcp/cli/api/skill access
    verification_command_shape: shell-parseable command, not prose or URL
    hidden_access: admin-ui-only, cms-only, or unknown requires waiver and future waiver_expires

version: 1
defaults:
  permissions: yolo
  reasoning: provider-default
  worktree: recommended
  smoke_timeout_s: 30
providers:
  codex:
    tier: primary
    kind: cli
    probe: codex --version
    dispatch: codex exec --dangerously-bypass-approvals-and-sandbox --model gpt-5.5 --config model_reasoning_effort="medium"
    output: json
    model: gpt-5.5
    reasoning: medium
    permissions: dangerous bypass approvals and sandbox
    worktree: recommended
    smoke: codex exec --dangerously-bypass-approvals-and-sandbox --model gpt-5.5 --config model_reasoning_effort="medium"
    notes: OpenAI Codex CLI; prefer non-interactive exec for isolated attempts.
  claude:
    tier: primary
    kind: cli
    probe: claude --version
    dispatch: claude -p --dangerously-skip-permissions --permission-mode bypassPermissions --model claude-opus-4-7 --effort xhigh
    output: json
    model: claude-opus-4-7
    reasoning: xhigh
    permissions: dangerous skip permissions plus bypass permission mode
    worktree: recommended
    smoke: claude -p --dangerously-skip-permissions --permission-mode bypassPermissions --model claude-opus-4-7 --effort xhigh
    notes: Claude Code CLI; use print mode and structured output when possible.
  pi:
    tier: primary
    kind: cli
    probe: pi --version
    dispatch: pi -p --provider openrouter --model moonshotai/kimi-k2.5 --thinking xhigh --tools read,bash,edit,write,grep,find,ls
    output: json
    model: openrouter/moonshotai/kimi-k2.5
    reasoning: xhigh
    permissions: full read bash edit write grep find ls tool list
    worktree: recommended
    smoke: pi -p --provider openrouter --model moonshotai/kimi-k2.5 --thinking xhigh --tools read,bash,edit,write,grep,find,ls
    notes: Pi coding agent; SOTA open-weight lane. Pinned to kimi-k2.5 because pi's native model registry recognizes it (thinking + tools, 262K ctx) so the lane resolves clean. kimi-k2.6 is newer but absent from pi's registry, so pi routes it as a "custom model id" and prints a benign "not found for provider openrouter" warning that is NOT a failure (the lane still answers) — judge lane health by transcript content + exit code, not that warning. Revisit when pi's registry adds k2.6+.
  agy:
    tier: conditional
    kind: cli
    probe: agy --help
    dispatch: agy --dangerously-skip-permissions --print-timeout 10m --print
    output: text
    model: gemini-3.5-flash
    reasoning: medium
    permissions: dangerous skip permissions
    worktree: recommended
    smoke: agy --dangerously-skip-permissions --print-timeout 2m --print
    notes: Google Antigravity CLI; keep --print last because it consumes the next argument as the prompt.
  cursor-agent:
    tier: conditional
    kind: cli
    probe: cursor-agent --version
    dispatch: cursor-agent -p --yolo --sandbox disabled --trust --approve-mcps --model composer-2.5
    output: text
    model: composer-2.5
    reasoning: max mode off
    permissions: yolo force with sandbox disabled and trusted workspace
    worktree: recommended
    smoke: cursor-agent -p --yolo --sandbox disabled --trust --approve-mcps --model composer-2.5
    notes: Cursor CLI path; enable only when the binary is installed and tested.
  grok-build:
    tier: conditional
    kind: cli
    probe: grok --version
    dispatch: grok --model grok-4.3 --permission-mode bypassPermissions --always-approve --effort max --reasoning-effort xhigh -p
    output: text
    model: grok-4.3
    reasoning: max effort with xhigh reasoning effort
    permissions: bypass permissions plus always approve
    worktree: recommended
    smoke: grok --model grok-4.3 --permission-mode bypassPermissions --always-approve --effort max --reasoning-effort xhigh -p
    notes: xAI Grok CLI; local Grok Build entitlement may fail, so default to the working Grok CLI model.
  opencode:
    tier: conditional
    kind: cli
    probe: opencode --version
    dispatch: opencode run --model openrouter/deepseek/deepseek-v4-pro --variant max --format json
    output: text
    model: openrouter/deepseek/deepseek-v4-pro
    reasoning: max variant
    permissions: global permission allow in opencode config
    worktree: recommended
    smoke: opencode run --model openrouter/deepseek/deepseek-v4-pro --variant max --format json
    notes: OpenCode CLI; complementary SOTA open-weight lane to Pi's Kimi default.
  manual:
    tier: manual
    kind: manual
    probe: manual
    dispatch: manual
    output: manual-summary
    permissions: human supplied
    worktree: not_applicable
    notes: Fallback for GUI-only tools, unavailable CLIs, or imported reports.

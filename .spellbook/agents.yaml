version: 1
providers:
  codex:
    tier: primary
    kind: cli
    probe: codex --version
    dispatch: codex exec
    output: json
    permissions: workspace-write via harness policy
    worktree: recommended
    notes: OpenAI Codex CLI; prefer non-interactive exec for isolated attempts.
  claude:
    tier: primary
    kind: cli
    probe: claude --version
    dispatch: claude -p
    output: json
    permissions: explicit permission-mode flag
    worktree: recommended
    notes: Claude Code CLI; use print mode and structured output when possible.
  pi:
    tier: primary
    kind: cli
    probe: pi --version
    dispatch: pi -p
    output: json
    permissions: explicit tools list
    worktree: recommended
    notes: Pi coding agent; use text, JSON, or RPC mode depending on task.
  agy:
    tier: conditional
    kind: cli
    probe: agy --help
    dispatch: agy --print
    output: text
    permissions: explicit permission flag when needed
    worktree: recommended
    notes: Google Anti-Gravity CLI; smoke-test locally before relying on output.
  cursor-agent:
    tier: conditional
    kind: cli
    probe: cursor-agent --version
    dispatch: cursor-agent -p
    output: text
    permissions: provider policy
    worktree: recommended
    notes: Cursor CLI path; enable only when the binary is installed and tested.
  grok-build:
    tier: conditional
    kind: cli
    probe: grok --version
    dispatch: grok -p -m grok-build-0.1
    output: text
    permissions: provider policy
    worktree: recommended
    notes: xAI Grok Build beta; official binary name is grok.
  manual:
    tier: manual
    kind: manual
    probe: manual
    dispatch: manual
    output: manual-summary
    permissions: human supplied
    worktree: not_applicable
    notes: Fallback for GUI-only tools, unavailable CLIs, or imported reports.

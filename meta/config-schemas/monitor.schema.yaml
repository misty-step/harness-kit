$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://harness-kit.local/schemas/monitor.schema.yaml"
title: Harness Kit Monitor Config
type: object
additionalProperties: false
required:
  - schema_version
properties:
  schema_version:
    type: integer
    const: 1
  grace_window:
    type: string
    minLength: 2
    description: Duration string such as 30s, 5m, 1h, or 1d.
  poll_interval:
    type: string
    minLength: 2
  observability:
    type: object
    additionalProperties: false
    properties:
      delegation_receipts:
        type: string
      workflow_events:
        type: string
      evidence_dirs:
        type: array
        items:
          type: string
      local_logs:
        type: array
        items:
          type: string
      benchmark_outputs:
        type: array
        items:
          type: string
      release_smoke:
        type: array
        items:
          type: string
      analytics_coverage:
        type: string
  healthcheck:
    type: object
    additionalProperties: false
    required: [url]
    properties:
      url:
        type: string
        format: uri
      expected_status:
        type: integer
        minimum: 100
        maximum: 599
      hard_fail_on_5xx:
        type: boolean
  signals:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [name, source, threshold]
      properties:
        name:
          type: string
          minLength: 1
        source:
          type: string
          enum: [datadog, prometheus, grafana, loki, logs, custom]
        query:
          type: string
          minLength: 1
        url:
          type: string
          format: uri
        threshold:
          type: string
          minLength: 1
        jq:
          type: string
          minLength: 1
        hard_fail:
          type: boolean
anyOf:
  - required: [schema_version, healthcheck]
  - required: [schema_version, signals]
  - required: [schema_version, observability]

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://harness-kit.local/schemas/flywheel.schema.yaml"
title: Harness Kit Flywheel Config
type: object
additionalProperties: false
required:
  - schema_version
properties:
  schema_version:
    type: integer
    const: 1
  cadence:
    type: string
    minLength: 2
    description: Duration string such as 30s, 5m, 1h, or 1d.
  max_cycles:
    type: integer
    minimum: 1
  budget_tokens:
    type: integer
    minimum: 1
  backlog_includes:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  stop_on_monitor_alert:
    type: boolean
  stop_on_phase_failed:
    type: boolean
  stop_on_budget_exhausted:
    type: boolean

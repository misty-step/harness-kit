$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://harness-kit.local/schemas/deploy.schema.yaml"
title: Harness Kit Deploy Config
type: object
additionalProperties: false
required:
  - schema_version
  - target
properties:
  schema_version:
    type: integer
    const: 1
  target:
    type: string
    enum: [fly, vercel, cloudflare, aws, s3, docker, k8s, custom]
  app:
    type: string
    minLength: 1
  envs:
    type: object
    minProperties: 1
    additionalProperties:
      type: object
      additionalProperties: false
      properties:
        app:
          type: string
          minLength: 1
        healthcheck:
          type: string
          format: uri
        rollback_grace_seconds:
          type: integer
          minimum: 1
        require_ci_green:
          type: boolean
  healthcheck:
    type: string
    format: uri
  rollback_grace_seconds:
    type: integer
    minimum: 1
  idempotent:
    type: boolean
  deploy_cmd:
    type: string
    minLength: 1
  current_sha_cmd:
    type: string
    minLength: 1
  rollback_handle_cmd:
    type: string
    minLength: 1
  rollback_cmd:
    type: string
    minLength: 1
allOf:
  - if:
      properties:
        target:
          const: custom
      required: [target]
    then:
      required:
        - deploy_cmd
        - current_sha_cmd
        - rollback_handle_cmd
        - rollback_cmd
